<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: { 'main-blue': '#3861fb', 'main-green': '#16c784', 'main-red': '#ea3943' }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/static/main/css/site.css" />
</head>
<body class="flex h-screen overflow-hidden bg-[#f8fafd] font-sans antialiased text-[#191d23] selection:bg-main-blue/20 selection:text-main-blue">
  <script>
    window.__LOCALE__ = "{{ locale | default('ru') }}";
    window.__TRANSLATIONS__ = {{ translations_json | default('{}') | safe }};
  </script>
  <aside id="sidebar-main"
         data-initial-page="{{ initial_page | default('dashboard') }}"
         data-app-name="{{ app_name | default('Escrow') }}"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-[#eff2f5] flex items-center justify-between px-4 md:px-6 sticky top-0 z-10 shrink-0">
      <div class="flex items-center gap-2 md:gap-4">
        <span class="text-xs md:text-sm font-medium text-[#58667e]">{{ app_name }}</span>
      </div>
      <div class="flex items-center gap-2">
        <a href="/" id="header-logout" class="inline-flex items-center gap-2 px-4 py-2 text-[13px] font-medium text-[#58667e] hover:text-main-red hover:bg-[#eff2f5] rounded-lg transition-colors" title="{{ _('main.logout') }}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span>{{ _('main.logout') }}</span>
        </a>
      </div>
    </header>
    <main class="flex-1 overflow-hidden flex flex-col relative">
      <div class="flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </div>
      <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_-20%,rgba(56,97,251,0.05),transparent_50%)]" aria-hidden="true"></div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
