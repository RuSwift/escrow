<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% if simple_deal_uid %}{{ _('main.simple.window_title_deal_uid', app_name=app_name, deal_uid=simple_deal_uid) }}{% elif simple_order_id %}{{ _('main.simple.window_title_deal', app_name=app_name, order_id=simple_order_id) }}{% else %}{{ _('main.simple.window_title_list', app_name=app_name) }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/main/css/site.css" />
  <link rel="stylesheet" href="/static/main/css/simple.css" />
</head>
<body class="m-0 p-0 overflow-x-hidden">
  <script>
    window.__LOCALE__ = "{{ locale | default('ru') }}";
    window.__TRANSLATIONS__ = {{ translations_json | default('{}') | safe }};
    window.__TRON_NETWORK__ = "{{ tron_network | default('mainnet') | e }}";
    window.__SIMPLE_STABLECOINS__ = {{ simple_stablecoins_json | default('[]') | safe }};
    window.__SIMPLE_FIAT_CODES__ = {{ simple_system_currencies_json | default('[]') | safe }};
  </script>
  <div id="simple-root" data-app-name="{{ app_name | e }}" data-simple-arbiter-space-did="{{ arbiter_space_did | default('') | e }}" data-simple-deal-uid="{{ simple_deal_uid | default('') | e }}" data-simple-order-id="{{ simple_order_id | default('') | e }}"></div>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <script src="/static/main/js/dialog.js"></script>
  <script src="/static/main/js/auth.js"></script>
  <script src="/static/main/js/tron-login.js"></script>
  <script src="/static/main/js/simple.js"></script>
</body>
</html>
