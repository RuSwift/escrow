<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="/static/main/css/site.css" />
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-zinc-50 font-sans antialiased text-zinc-900 overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(59,130,246,0.06),transparent_60%)]" aria-hidden="true"></div>
  <main class="relative z-10 text-center px-6">
    <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-zinc-900 mb-4">
      {{ splash_title }}
    </h1>
    <p class="text-lg md:text-xl text-zinc-500 font-medium">
      {{ app_name }}
    </p>
  </main>
</body>
</html>
