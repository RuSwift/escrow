version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: escrow-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-escrow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-escrow}
      POSTGRES_DB: ${DB_DATABASE:-escrow}
    ports:
      - "5432:5432"
    volumes:
      - escrow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-escrow} -d ${DB_DATABASE:-escrow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - escrow-network

  redis:
    image: redis:7-alpine
    container_name: escrow-redis
    ports:
      - "6379:6379"
    volumes:
      - escrow_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - escrow-network

volumes:
  escrow_postgres_data:
    driver: local
  escrow_redis_data:
    driver: local

networks:
  escrow-network:
    driver: bridge
