<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <link rel="stylesheet" href="/static/node/css/site.css" />
</head>
<body class="flex h-screen overflow-hidden bg-zinc-50 font-sans antialiased text-zinc-900 selection:bg-blue-100 selection:text-blue-900">
  <script>
    window.__LOCALE__ = "{{ locale | default('ru') }}";
    window.__TRANSLATIONS__ = {{ translations_json | default('{}') | safe }};
  </script>
  {# Sidebar: рендерится Vue (sidebar.js), данные для начальной страницы и названия приложения #}
  <aside id="sidebar-app"
         data-initial-page="{{ initial_page | default('dashboard') }}"
         data-app-name="{{ app_name | default('Escrow Node') }}"></aside>
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-zinc-200 flex items-center justify-between px-8 sticky top-0 z-10 shrink-0">
      <div class="flex items-center gap-6">
        <div id="header-search-wrap" class="hidden md:flex items-center bg-zinc-100 rounded-full pl-4 pr-2 py-1.5 w-80 border border-transparent focus-within:border-blue-500/30 focus-within:bg-white focus-within:shadow-sm transition-all relative">
          <svg class="w-4 h-4 text-zinc-400 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input type="text" id="header-search" placeholder="{{ _('node.search_placeholder') }}" class="bg-transparent border-none outline-none text-[13px] flex-1 min-w-0 placeholder:text-zinc-400" autocomplete="off" />
          <button type="button" id="header-search-clear" class="hidden p-1.5 rounded-full text-zinc-400 hover:text-zinc-600 hover:bg-zinc-200/80 shrink-0" aria-label="{{ _('node.search_clear') }}" title="{{ _('node.search_clear') }}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" id="header-logout" class="inline-flex items-center gap-2 px-4 py-2 text-[13px] font-medium text-zinc-600 hover:text-zinc-900 hover:bg-zinc-100 rounded-lg transition-colors" title="{{ _('node.logout') }}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span>{{ _('node.logout') }}</span>
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-hidden flex flex-col relative">
      <div class="flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </div>
      <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_-20%,rgba(59,130,246,0.05),transparent_50%)]" aria-hidden="true"></div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
  <script>
    (function() {
      function dispatchHeaderSearch(query) {
        try {
          window.dispatchEvent(new CustomEvent('header-search', { detail: { query: query } }));
        } catch (e) {}
      }
      var searchInput = document.getElementById('header-search');
      var searchClear = document.getElementById('header-search-clear');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          var val = (searchInput.value || '').trim();
          if (searchClear) searchClear.classList.toggle('hidden', !searchInput.value);
          dispatchHeaderSearch(val);
        });
      }
      if (searchClear && searchInput) {
        searchClear.addEventListener('click', function() {
          searchInput.value = '';
          searchClear.classList.add('hidden');
          dispatchHeaderSearch('');
          searchInput.focus();
        });
        if (searchInput.value) searchClear.classList.remove('hidden');
      }
      var logoutEl = document.getElementById('header-logout');
      if (logoutEl) {
        logoutEl.addEventListener('click', function() {
          document.cookie = 'admin_token=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax';
          window.location.href = '/';
        });
      }
    })();
  </script>
</body>
</html>
