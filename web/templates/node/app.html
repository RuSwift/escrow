{% extends "node/base.html" %}
{% block title %}{{ page_title }} — {{ app_name }}{% endblock %}
{% block content %}
<div id="app"
     data-initial-page="{{ initial_page | default('dashboard') }}"
     data-is-node-initialized="{{ 'true' if is_node_initialized else 'false' }}">
  <div class="p-8 bg-zinc-50/50 flex-1 overflow-y-auto flex items-center justify-center">
    <p class="text-zinc-400 text-sm">{{ _('node.loading') }}</p>
  </div>
</div>
<div id="node-init-modal-container"></div>
<script id="is-node-initialized" type="application/json">{{ node_init_status_json }}</script>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="/static/node/js/sidebar.js"></script>
<script src="/static/node/js/modal.js"></script>
<script src="/static/node/js/node-init-modal.js"></script>
<script src="/static/node/js/dashboard.js"></script>
<script src="/static/node/js/wallet-users.js"></script>
<script src="/static/node/js/arbiter.js"></script>
<script src="/static/node/js/wallets.js"></script>
<script src="/static/node/js/node.js"></script>
<script src="/static/node/js/admin.js"></script>
<script src="/static/node/js/settings.js"></script>
<script src="/static/node/js/support.js"></script>
<script src="/static/node/js/app.js"></script>
{% endblock %}
