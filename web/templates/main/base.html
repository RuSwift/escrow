<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: { 'main-blue': '#3861fb', 'main-green': '#16c784', 'main-red': '#ea3943' }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/static/main/css/site.css" />
</head>
<body class="flex h-screen overflow-hidden bg-[#f8fafd] font-sans antialiased text-[#191d23] selection:bg-main-blue/20 selection:text-main-blue">
  <script>
    window.__LOCALE__ = "{{ locale | default('ru') }}";
    window.__TRANSLATIONS__ = {{ translations_json | default('{}') | safe }};
    window.__TRON_NETWORK__ = "{{ tron_network | default('mainnet') | e }}";
    console.log('Escrow base.html v2 loaded');
  </script>
  <script src="/static/main/js/dialog.js"></script>
  <script>
    window.handleLogoutClick = function(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      console.log('Logout v2 clicked');
      var t = window.__TRANSLATIONS__ || {};
      var title = t['main.logout_confirm_title'] || 'Logout';
      var message = t['main.logout_confirm_message'] || 'Are you sure you want to log out?';
      
      if (typeof window.showConfirm === 'function') {
        window.showConfirm({
          title: title,
          message: message,
          danger: true,
          onConfirm: function() {
            console.log('Logout v2 confirmed');
            try {
              var redirectToHome = function() { window.location.href = '/'; };
              if (typeof fetch === 'function') {
                fetch('/v1/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(function() {
                  try { localStorage.removeItem('main_auth_token'); } catch(err){}
                  redirectToHome();
                });
              } else {
                try { localStorage.removeItem('main_auth_token'); } catch(err){}
                redirectToHome();
              }
            } catch (err) {
              window.location.href = '/';
            }
          }
        });
      } else {
        if (confirm(message)) {
          try { localStorage.removeItem('main_auth_token'); } catch(err){}
          window.location.href = '/';
        }
      }
    };
  </script>
  <aside id="sidebar-main" class="fixed inset-y-0 left-0 z-40 w-0 min-w-0 overflow-visible md:static md:z-auto md:w-auto"
         data-initial-page="{{ initial_page | default('dashboard') }}"
         data-app-name="{{ app_name | default('Escrow') }}"
         data-space="{{ space | default('') }}"
         data-space-role="{{ space_role | default('') }}"></aside>
  <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-[#eff2f5] sticky top-0 z-10 shrink-0 px-4 md:px-6 py-2 md:py-0 min-h-[4rem] md:h-16 flex flex-col gap-2 md:flex-row md:items-center md:justify-between md:gap-4">
      <div class="flex items-center gap-2 md:gap-4 min-w-0 w-full md:w-auto md:flex-1">
        <button type="button" id="sidebar-toggle" class="md:hidden p-2 -ml-2 rounded-lg text-[#58667e] hover:bg-[#eff2f5] hover:text-[#191d23] transition-colors shrink-0" aria-label="{{ _('main.sidebar.open_menu') }}" title="{{ _('main.sidebar.open_menu') }}">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="flex items-center gap-2 min-w-0 flex-wrap flex-1">
          <span class="text-sm md:text-base font-semibold text-[#191d23] shrink-0">{{ app_name }}</span>
          {% if space %}
          <div class="relative shrink-0 min-w-0">
            <button type="button" id="header-space-badge" class="inline-flex items-center max-w-full min-w-0 rounded-full bg-main-blue/12 text-main-blue border border-main-blue/25 px-2.5 py-1 text-[11px] md:text-xs font-medium hover:bg-main-blue/20 transition-colors cursor-help text-left break-words" aria-describedby="header-space-tooltip">
              space [{{ space }}{% if space_company_name %}, {{ space_company_name }}{% endif %}]
            </button>
            <div id="header-space-tooltip" class="hidden absolute left-0 top-full mt-1.5 z-50 w-64 max-w-[calc(100vw-2rem)] rounded-lg bg-[#0a0b0d] text-white text-xs leading-relaxed p-3 shadow-xl border border-white/10" role="tooltip">
              <p class="mb-2">{{ _('main.space.header_tooltip') }}</p>
              {% if space_role is defined and space_role %}
              <p class="mt-2 pt-2 border-t border-white/20">{{ _('main.space.your_role', role=_('main.space.role_' ~ space_role)) }}</p>
              {% endif %}
            </div>
          </div>
          {% endif %}
        </div>
      </div>
      <div class="flex items-center gap-2 sm:gap-3 w-full md:w-auto shrink-0 min-w-0 justify-end border-t border-[#eff2f5] pt-2 md:border-0 md:pt-0">
        <button type="button" id="header-user-did" class="flex-1 md:flex-none min-w-0 md:max-w-[320px] text-left truncate text-[11px] md:text-xs font-mono text-[#58667e] hover:text-[#191d23] bg-transparent border-0 cursor-pointer p-0" title="" aria-label="{{ _('main.copy_did') }}" data-copy-label="{{ _('main.copied') }}"></button>
        <button type="button" id="header-logout-v2" onclick="window.handleLogoutClick(event)" class="inline-flex items-center gap-2 px-3 py-2 md:px-4 text-[13px] font-medium text-[#58667e] hover:text-main-red hover:bg-[#eff2f5] rounded-lg transition-colors shrink-0" title="{{ _('main.logout') }}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span>{{ _('main.logout') }}</span>
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-hidden flex flex-col relative">
      <div class="flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </div>
      <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_-20%,rgba(56,97,251,0.05),transparent_50%)]" aria-hidden="true"></div>
    </main>
  </div>
  {% block scripts %}
  <script>
    (function() {
      // Space badge tooltip logic
      document.addEventListener('click', function(e) {
        var btn = e.target.closest('#header-space-badge');
        var tooltip = document.getElementById('header-space-tooltip');
        if (btn && tooltip) {
          e.stopPropagation();
          tooltip.classList.toggle('hidden');
        } else if (tooltip) {
          tooltip.classList.add('hidden');
        }
      });
    })();
  </script>
  {% endblock %}
</body>
</html>
