{% extends "main/base.html" %}
{% block title %}{{ app_name }}{% endblock %}
{% block content %}
<div id="app-main"
     data-initial-page="{{ initial_page | default('dashboard') }}"
     data-escrow-id="{{ escrow_id | default('') }}"
     data-space="{{ space | default('') }}"
     data-space-role="{{ space_role | default('') }}"
     data-space-subs-count="{{ space_subs_count | default(-1) }}"
     data-space-profile-filled="{{ 'true' if (space_profile_filled | default(true)) else 'false' }}"
     data-space-owner-tron="{{ space_owner_wallet_tron | default('') }}">
  <div class="p-8 bg-[#f8fafd] flex-1 overflow-y-auto flex items-center justify-center">
    <p class="text-[#58667e] text-sm">{{ _('main.loading') }}</p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>window.__COLLATERAL_STABLECOIN_TOKENS__ = {{ collateral_stablecoin_tokens_json | safe }};</script>
<script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
<script src="/static/main/js/auth.js"></script>
<script src="/static/main/js/dialog.js"></script>
<script src="/static/main/js/sidebar.js"></script>
<script src="/static/main/js/multisig_config_modal.js"></script>
<script src="/static/main/js/withdrawal_order_modal.js"></script>
<script src="/static/main/js/dashboard.js"></script>
<script src="/static/main/js/space_roles.js"></script>
<script src="/static/main/js/space_profile.js"></script>
<script src="/static/main/js/how-it-works.js"></script>
<script src="/static/main/js/api-docs.js"></script>
<script src="/static/main/js/my_business.js"></script>
<script src="/static/main/js/guarantor.js"></script>
<script src="/static/main/js/settings.js"></script>
<script src="/static/main/js/support.js"></script>
<script src="/static/main/js/deal-detail.js"></script>
<script src="/static/main/js/app.js"></script>
{% endblock %}
