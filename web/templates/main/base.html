<!DOCTYPE html>
<html lang="{{ locale | default('ru') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: { 'main-blue': '#3861fb', 'main-green': '#16c784', 'main-red': '#ea3943' }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="/static/main/css/site.css" />
</head>
<body class="flex h-screen overflow-hidden bg-[#f8fafd] font-sans antialiased text-[#191d23] selection:bg-main-blue/20 selection:text-main-blue">
  <script>
    window.__LOCALE__ = "{{ locale | default('ru') }}";
    window.__TRANSLATIONS__ = {{ translations_json | default('{}') | safe }};
  </script>
  <aside id="sidebar-main" class="fixed inset-y-0 left-0 z-40 w-0 min-w-0 overflow-visible md:static md:z-auto md:w-auto"
         data-initial-page="{{ initial_page | default('dashboard') }}"
         data-app-name="{{ app_name | default('Escrow') }}"
         data-space="{{ space | default('') }}"></aside>
  <div class="flex-1 min-w-0 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-[#eff2f5] flex items-center justify-between px-4 md:px-6 sticky top-0 z-10 shrink-0">
      <div class="flex items-center gap-2 md:gap-4 min-w-0">
        <button type="button" id="sidebar-toggle" class="md:hidden p-2 -ml-2 rounded-lg text-[#58667e] hover:bg-[#eff2f5] hover:text-[#191d23] transition-colors shrink-0" aria-label="{{ _('main.sidebar.open_menu') }}" title="{{ _('main.sidebar.open_menu') }}">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="flex items-center gap-2 min-w-0 flex-wrap">
          <span class="text-sm md:text-base font-semibold text-[#191d23] shrink-0">{{ app_name }}</span>
          {% if space %}
          <div class="relative shrink-0">
            <button type="button" id="header-space-badge" class="inline-flex items-center rounded-full bg-main-blue/12 text-main-blue border border-main-blue/25 px-2.5 py-1 text-[11px] md:text-xs font-medium hover:bg-main-blue/20 transition-colors cursor-help" aria-describedby="header-space-tooltip">
              space [{{ space }}]
            </button>
            <div id="header-space-tooltip" class="hidden absolute left-0 top-full mt-1.5 z-50 w-64 max-w-[calc(100vw-2rem)] rounded-lg bg-[#0a0b0d] text-white text-xs leading-relaxed p-3 shadow-xl border border-white/10" role="tooltip">
              {{ _('main.space.header_tooltip') }}
            </div>
          </div>
          {% endif %}
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" id="header-user-did" class="max-w-[200px] md:max-w-[320px] min-w-0 text-left text-[11px] md:text-xs font-mono text-[#58667e] hover:text-[#191d23] bg-transparent border-0 cursor-pointer p-0" title="" aria-label="{{ _('main.copy_did') }}" data-copy-label="{{ _('main.copied') }}"></button>
        <a href="/" id="header-logout" class="inline-flex items-center gap-2 px-4 py-2 text-[13px] font-medium text-[#58667e] hover:text-main-red hover:bg-[#eff2f5] rounded-lg transition-colors shrink-0" title="{{ _('main.logout') }}" onclick="try{ (typeof logout === 'function' ? logout : function(){ localStorage.removeItem('main_auth_token'); })(); }catch(e){}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span>{{ _('main.logout') }}</span>
        </a>
      </div>
    </header>
    <main class="flex-1 overflow-hidden flex flex-col relative">
      <div class="flex-1 overflow-y-auto">
        {% block content %}{% endblock %}
      </div>
      <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_-20%,rgba(56,97,251,0.05),transparent_50%)]" aria-hidden="true"></div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
  <script>
    (function() {
      var btn = document.getElementById('header-space-badge');
      var tooltip = document.getElementById('header-space-tooltip');
      if (!btn || !tooltip) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        tooltip.classList.toggle('hidden');
      });
      document.addEventListener('click', function() {
        tooltip.classList.add('hidden');
      });
    })();
  </script>
</body>
</html>
